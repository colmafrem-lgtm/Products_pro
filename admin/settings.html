<div class="main">
  <div class="topbar">
    <div class="topbar-title">Site Settings</div>
    <div class="topbar-right">
      <button onclick="saveSettings()" id="saveBtn" class="btn btn-primary">💾 Save All Settings</button>
      <div class="admin-avatar" id="adminInitial">A</div>
    </div>
  </div>

  <div class="page-content">
    <div id="alertBox" class="hidden"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;" id="settingsGrid">
      <div class="spinner" style="grid-column:1/-1;"></div>
    </div>
  </div>
</div>

<script src="js/admin-api.js"></script>
<script>
  requireAdminAuth();
  initAdminTopbar();

  let allSettings = [];

  const settingGroups = {
    'Site Information': ['site_name', 'site_logo', 'support_email', 'support_telegram'],
    'Financial Rules': ['min_deposit', 'min_withdrawal', 'withdrawal_fee', 'referral_bonus'],
    'Wallet Addresses': ['usdt_wallet'],
    'System': ['maintenance_mode']
  };

  const settingLabels = {
    site_name: 'Site Name',
    site_logo: 'Company Logo',
    support_email: 'Support Email',
    support_telegram: 'Telegram Support',
    min_deposit: 'Minimum Deposit ($)',
    min_withdrawal: 'Minimum Withdrawal ($)',
    withdrawal_fee: 'Withdrawal Fee (%)',
    referral_bonus: 'Referral Bonus ($)',
    usdt_wallet: 'USDT (TRC20) Wallet Address',
    maintenance_mode: 'Maintenance Mode (true/false)'
  };

  const settingIcons = {
    site_name: '🌐', site_logo: '🖼️', support_email: '📧', support_telegram: '💬',
    min_deposit: '💰', min_withdrawal: '💸', withdrawal_fee: '💹', referral_bonus: '🎁',
    usdt_wallet: '👛', maintenance_mode: '🔧'
  };

  async function loadSettings() {
    const res = await Admin.getSettings();
    const grid = document.getElementById('settingsGrid');

    if (!res || !res.ok) {
      grid.innerHTML = '<div class="alert alert-danger" style="grid-column:1/-1;">Failed to load settings. (Requires superadmin role)</div>';
      return;
    }

    allSettings = res.data.data;
    const settingsMap = {};
    allSettings.forEach(s => settingsMap[s.setting_key] = s.setting_value);

    let html = '';
    for (const [groupName, keys] of Object.entries(settingGroups)) {
      html += `
        <div class="card">
          <div class="card-head"><h3>${groupName}</h3></div>
          <div class="card-body">
            ${keys.map(key => `
              <div class="form-group">
                <label class="form-label">${settingIcons[key] || '⚙️'} ${settingLabels[key] || key}</label>
                ${key === 'maintenance_mode'
                  ? `<select id="setting_${key}" class="form-control">
                      <option value="false" ${settingsMap[key] === 'false' ? 'selected' : ''}>Disabled</option>
                      <option value="true"  ${settingsMap[key] === 'true'  ? 'selected' : ''}>Enabled</option>
                     </select>`
                  : key === 'site_logo'
                  ? `<input type="hidden" id="setting_site_logo" value="${settingsMap[key] || ''}">
                     ${settingsMap[key] ? `<div style="margin-bottom:10px;"><img id="logoPreview" src="${settingsMap[key]}" alt="Logo" style="max-height:80px;max-width:200px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);padding:4px;background:#fff;"></div>` : `<div style="margin-bottom:10px;"><img id="logoPreview" src="" alt="" style="max-height:80px;max-width:200px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);padding:4px;background:#fff;display:none;"></div>`}
                     <div style="display:flex;gap:10px;align-items:center;">
                       <label style="flex:1;cursor:pointer;background:rgba(255,255,255,0.07);border:1px dashed rgba(255,255,255,0.25);border-radius:10px;padding:10px 14px;text-align:center;color:rgba(255,255,255,0.6);font-size:13px;" id="logoUploadLabel">
                         📁 Click to choose logo image...
                         <input type="file" accept="image/*" style="display:none;" onchange="uploadLogo(this)">
                       </label>
                       <span id="logoUploadStatus" style="font-size:12px;color:rgba(255,255,255,0.4);"></span>
                     </div>`
                  : `<input type="${key.includes('email') ? 'email' : 'text'}"
                            id="setting_${key}"
                            class="form-control"
                            value="${settingsMap[key] || ''}"
                            placeholder="Enter ${settingLabels[key] || key}">`
                }
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    grid.innerHTML = html;
  }

  async function saveSettings() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving...';

    const allKeys = Object.values(settingGroups).flat();
    const settings = allKeys.map(key => ({
      key,
      value: document.getElementById('setting_' + key)?.value || ''
    }));

    const res = await Admin.updateSettings(settings);
    btn.disabled = false; btn.textContent = '💾 Save All Settings';

    if (!res || !res.ok) {
      showMsg('alertBox', res?.data?.message || 'Failed to save settings.', 'danger');
      return;
    }

    showMsg('alertBox', '✅ Settings saved successfully!', 'success');
  }

  async function uploadLogo(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const status = document.getElementById('logoUploadStatus');
    const label = document.getElementById('logoUploadLabel');
    status.textContent = 'Uploading...';
    label.style.opacity = '0.5';

    const formData = new FormData();
    formData.append('image', file);

    try {
      const token = getAdminToken();
      const res = await fetch('/api/admin/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      if (res.ok && data.url) {
        document.getElementById('setting_site_logo').value = data.url;
        const preview = document.getElementById('logoPreview');
        preview.src = data.url;
        preview.style.display = '';
        label.querySelector('input').value = '';
        const name = file.name.length > 24 ? file.name.substring(0, 21) + '...' : file.name;
        label.childNodes[0].textContent = `✅ ${name} `;
        status.textContent = 'Uploaded!';
        status.style.color = '#4ade80';
      } else {
        status.textContent = 'Upload failed.';
        status.style.color = '#f87171';
      }
    } catch(e) {
      status.textContent = 'Network error.';
      status.style.color = '#f87171';
    }
    label.style.opacity = '1';
  }

  loadSettings();
</script>
</body>
