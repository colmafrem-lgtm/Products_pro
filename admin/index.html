<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - SyncralinkUS</title>
<link rel="stylesheet" href="css/admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="js/sitename.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    position: relative; overflow: hidden;
    background: #0a0f1e;
  }

  /* Background: dark office / dashboard photo */
  .bg-photo {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1600&q=80&fit=crop');
    background-size: cover;
    background-position: center;
    filter: brightness(0.35) saturate(0.8);
  }

  /* Subtle color overlay */
  .bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(135deg,
      rgba(10,15,40,0.7) 0%,
      rgba(60,20,80,0.4) 50%,
      rgba(10,15,40,0.8) 100%);
  }

  /* Glass card — iOS style */
  .login-card {
    position: relative; z-index: 2;
    width: 380px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 28px;
    padding: 48px 36px 40px;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.4),
      0 1px 0 rgba(255,255,255,0.12) inset,
      0 -1px 0 rgba(0,0,0,0.2) inset;
  }

  /* Logo area */
  .login-logo {
    text-align: center;
    margin-bottom: 36px;
  }
  .login-logo .icon-wrap {
    width: 64px; height: 64px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .login-logo .brand {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .login-logo .sub {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 6px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.1);
    margin-bottom: 28px;
  }

  /* Form labels */
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  /* Inputs */
  .form-group { margin-bottom: 16px; }
  .form-control {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: #fff;
    outline: none;
    transition: border-color .2s, background .2s, box-shadow .2s;
  }
  .form-control::placeholder { color: rgba(255,255,255,0.22); }
  .form-control:focus {
    border-color: rgba(139,92,246,0.7);
    background: rgba(255,255,255,0.11);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.18);
  }

  /* Button */
  .btn-login {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 50%, #EC4899 100%);
    border: none;
    border-radius: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(139,92,246,0.45);
    transition: transform .15s, box-shadow .15s, opacity .15s;
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(139,92,246,0.55); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: .55; transform: none; cursor: default; }

  /* Alert */
  .alert-danger {
    background: rgba(239,68,68,0.14);
    border: 1px solid rgba(239,68,68,0.28);
    color: #fca5a5;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="bg-photo"></div>
<div class="bg-overlay"></div>

<div class="login-card">
  <div class="login-logo">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:30px;height:30px;">
        <defs>
          <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#f472b6"/>
          </linearGradient>
        </defs>
        <rect x="3" y="11" width="18" height="11" rx="2" stroke="url(#lg)"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="url(#lg)"/>
      </svg>
    </div>
    <div class="brand" data-site-name>SyncralinkUS</div>
    <div class="sub">Admin Control Panel</div>
  </div>

  <div class="divider"></div>

  <div id="alertBox" class="hidden"></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Admin Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter admin username" autocomplete="off" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter password" required>
    </div>
    <button type="submit" id="loginBtn" class="btn-login">
      Login to Dashboard
    </button>
  </form>
</div>

<script src="js/admin-api.js"></script>
<script>
  if (getAdminToken()) window.location.href = 'dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Logging in...';

    const res = await Admin.login(
      document.getElementById('username').value.trim(),
      document.getElementById('password').value
    );

    btn.disabled = false;
    btn.textContent = 'Login to Dashboard';

    if (!res || !res.ok) {
      const box = document.getElementById('alertBox');
      box.className = 'alert-danger';
      box.textContent = res?.data?.message || 'Login failed.';
      return;
    }

    saveAdminSession(res.data.data.token, res.data.data.admin);
    window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
