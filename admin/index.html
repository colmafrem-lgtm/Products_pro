<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - SyncralinkUS</title>
<link rel="stylesheet" href="css/admin.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: #0f0e1a;
    position: relative; overflow: hidden;
  }
  /* animated gradient blobs */
  body::before {
    content:''; position:fixed; top:-120px; left:-120px;
    width:420px; height:420px; border-radius:50%;
    background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 70%);
    animation: blobMove1 12s ease-in-out infinite alternate;
    pointer-events:none;
  }
  body::after {
    content:''; position:fixed; bottom:-100px; right:-100px;
    width:380px; height:380px; border-radius:50%;
    background: radial-gradient(circle, rgba(236,72,153,0.2) 0%, transparent 70%);
    animation: blobMove2 10s ease-in-out infinite alternate;
    pointer-events:none;
  }
  @keyframes blobMove1 { 0%{transform:translate(0,0)} 100%{transform:translate(60px,40px)} }
  @keyframes blobMove2 { 0%{transform:translate(0,0)} 100%{transform:translate(-50px,-30px)} }

  /* grid texture */
  .bg-grid {
    position:fixed; inset:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .login-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 44px 40px;
    width: 400px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(139,92,246,0.15);
    position: relative; z-index:2;
  }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .icon { font-size: 44px; margin-bottom: 12px; display:block; }
  .login-logo .brand { font-size: 26px; font-weight: 900; color: #fff; letter-spacing:-0.5px; }
  .login-logo .sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 5px; letter-spacing:1px; text-transform:uppercase; }

  /* override admin.css form styles for dark card */
  .login-card .form-label { color: rgba(255,255,255,0.6); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
  .login-card .form-control {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    transition: border-color .2s, box-shadow .2s;
  }
  .login-card .form-control::placeholder { color: rgba(255,255,255,0.25); }
  .login-card .form-control:focus {
    outline: none;
    border-color: rgba(139,92,246,0.6);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
    background: rgba(255,255,255,0.1);
  }
  .login-card .btn-primary {
    background: linear-gradient(135deg, #8B5CF6, #EC4899);
    border: none; border-radius: 14px;
    padding: 13px; font-size: 15px; font-weight: 800;
    color: #fff; cursor: pointer; width: 100%;
    box-shadow: 0 4px 20px rgba(139,92,246,0.4);
    transition: transform .15s, box-shadow .15s;
    margin-top: 8px;
  }
  .login-card .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(139,92,246,0.5); }
  .login-card .btn-primary:disabled { opacity:.6; transform:none; }
  .login-card .alert-danger { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:13px; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="login-card">
  <div class="login-logo">
    <div class="icon">🔐</div>
    <div class="brand">SyncralinkUS</div>
    <div class="sub">Admin Control Panel</div>
  </div>

  <div id="alertBox" class="hidden"></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Admin Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter admin username" value="admin" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter password" required>
    </div>
    <button type="submit" id="loginBtn" class="btn btn-primary" style="width:100%;padding:12px;font-size:15px;">
      Login to Dashboard
    </button>
  </form>

</div>

<script src="js/admin-api.js"></script>
<script>
  if (getAdminToken()) window.location.href = 'dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Logging in...';

    const res = await Admin.login(
      document.getElementById('username').value.trim(),
      document.getElementById('password').value
    );

    btn.disabled = false;
    btn.textContent = 'Login to Dashboard';

    if (!res || !res.ok) {
      showMsg('alertBox', res?.data?.message || 'Login failed.', 'danger');
      return;
    }

    saveAdminSession(res.data.data.token, res.data.data.admin);
    window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
