<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us - SyncralinkUS</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .about-hero {
    background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
    padding: 50px 24px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .about-hero::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px; background: rgba(255,255,255,0.07); border-radius: 50%;
  }
  .about-hero::after {
    content: ''; position: absolute; bottom: -50px; left: -50px;
    width: 160px; height: 160px; background: rgba(255,255,255,0.05); border-radius: 50%;
  }
  .about-hero .hero-icon {
    width: 72px; height: 72px; background: rgba(255,255,255,0.18); border-radius: 20px;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
    overflow: hidden;
  }
  .about-hero .hero-icon img {
    width: 100%; height: 100%; object-fit: contain; padding: 6px;
  }
  .about-hero h1 { color: #fff; font-size: 26px; font-weight: 900; margin: 0; }
  .about-hero p { color: rgba(255,255,255,0.75); font-size: 14px; margin-top: 8px; line-height: 1.6; }

  .about-body {
    background: var(--bg);
    border-radius: 28px 28px 0 0;
    margin-top: -28px;
    padding: 28px 16px 100px;
    position: relative;
    z-index: 2;
  }

  .section-title {
    font-size: 16px; font-weight: 800; color: var(--dark);
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .section-title svg { stroke: var(--primary); }

  .about-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--card-shadow); padding: 20px; margin-bottom: 16px;
  }
  .about-card p { font-size: 14px; color: var(--text-light); line-height: 1.75; margin: 0; }

  .feature-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }
  .feature-list li {
    display: flex; align-items: flex-start; gap: 14px;
    background: var(--white); border-radius: var(--radius-sm);
    padding: 16px; box-shadow: var(--card-shadow);
  }
  .feature-icon {
    width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .feature-text h4 { font-size: 14px; font-weight: 700; color: var(--dark); margin: 0 0 4px; }
  .feature-text p { font-size: 13px; color: var(--text-light); margin: 0; line-height: 1.5; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-box {
    background: var(--white); border-radius: var(--radius-sm); padding: 16px 10px;
    text-align: center; box-shadow: var(--card-shadow);
  }
  .stat-box .num { font-size: 20px; font-weight: 900; color: var(--primary); }
  .stat-box .lbl { font-size: 10px; color: var(--text-light); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }

  .contact-list { display: flex; flex-direction: column; gap: 10px; }
  .contact-item {
    display: flex; align-items: center; gap: 14px;
    background: var(--white); border-radius: var(--radius-sm);
    padding: 14px 16px; box-shadow: var(--card-shadow);
    text-decoration: none; color: var(--text);
  }
  .contact-item .c-icon {
    width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .contact-item .c-label { font-size: 12px; color: var(--text-light); }
  .contact-item .c-value { font-size: 14px; font-weight: 600; color: var(--dark); margin-top: 1px; }
</style>
<script src="js/maintenance.js"></script>
</head>
<body>

  <div class="about-body">

    <!-- Back button -->
    <a href="dashboard.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--primary);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:20px;">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;"><polyline points="15 18 9 12 15 6"/></svg>

    <!-- Stats -->
    <div class="stats-row">

      <div class="stat-box">
        <div class="num">96.3%</div>
        <div class="lbl">Quality Index</div>

    </div>

    <!-- Our Story -->
    <div class="section-title">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Our Story
    </div>
    <div class="about-card" id="storyCard">
      <div id="storyContent" style="font-size:14px;color:var(--text-light);line-height:1.85;"></div>

    <!-- Contact -->
    <div class="section-title" style="margin-top:20px;">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.28h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.28 15z"/></svg>
      Contact & Support
    </div>
    <div class="contact-list">
      <div class="contact-item">
        <div class="c-icon" style="background:linear-gradient(135deg,#EDE9FE,#DDD6FE);">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#8B5CF6;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div>
          <div class="c-label">Email Support</div>
          <div class="c-value" id="contactEmail">support@investpro.com</div>
        </div>
      </div>
      <div class="contact-item">
        <div class="c-icon" style="background:linear-gradient(135deg,#D1FAE5,#A7F3D0);">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#10B981;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div>
          <div class="c-label">Telegram</div>
          <div class="c-value" id="contactTelegram">@investpro_support</div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span>Home</span>
    </a>
    <a href="tasks.html" class="nav-item">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span>Tasks</span>
    </a>
    <a href="tasks.html" class="nav-item-center">
      <div class="nav-fab"><svg viewBox="0 0 24 24" style="width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    </a>
    <a href="wallet.html" class="nav-item">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg></span><span>Wallet</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span>Profile</span>
    </a>
  </nav>

</div>
<script src="js/api.js"></script>
<script src="js/transitions.js"></script>
<script>
  requireAuth();
  fetch('/api/public/settings').then(r => r.json()).then(res => {
    if (!res.success) return;
    const s = res.data;
    if (s.site_logo) {
      const wrap = document.getElementById('heroLogoWrap');
      wrap.innerHTML = `<img src="${s.site_logo}" alt="Logo">`;
    }
    if (s.site_name) {
      document.getElementById('heroSiteName').textContent = 'About ' + s.site_name;
    }
    if (s.support_email) {
      document.getElementById('contactEmail').textContent = s.support_email;
    }
    if (s.support_telegram) {
      document.getElementById('contactTelegram').textContent = s.support_telegram;
    }
    // Render Our Story — split by double newlines into paragraphs
    const storyEl = document.getElementById('storyContent');
    const defaultStory = `SINGULAR WORK BENCH INC was founded on June 30, 2004, serving clients in Canada and the United States. From a small team of passionate technologists, we have grown into a leading software development and digital engineering company that continues to break new ground in innovation.

SINGULAR WORK BENCH INC is a group of technology enthusiasts with diverse backgrounds in business automation, software development, design, and optimization. We are passionate about using our skills to maximize our clients' businesses. Our web and software development experts can help you automate everyday processes, improve workflows, and create custom web and mobile applications.

With skilled designers, efficient developers, and a practical approach to web and software development, we ensure that your business can automate everyday processes, enhance workflows, and create custom solutions that fit your specific needs.

We pride ourselves not only on delivering best-in-class solutions, but also on providing exceptional customer service and support. Whether you need to deploy an enterprise system or develop an application that revolutionizes the way your customers interact with your products or brand, we have the expertise and experience to deliver the right results.

Our SINGULAR WORK BENCH INC team is made up of a fun, energetic, highly qualified, and bunch of creative people. We are committed to working together to continually seek ways to improve the company, ourselves, and our clients.

SINGULAR WORK BENCH INC was founded with a vision to transform the software development industry by using cutting-edge technology to deliver exceptional results. From a small basement office, we have achieved many milestones. Today, we have offices in three locations around the world and work with some of the most renowned companies in the industry who trust us with their most challenging projects.

Our success is rooted in our strong values and corporate culture. At SINGULAR WORK BENCH INC, we are committed to creating an environment where our teams thrive. We attract and retain top talent by fostering a culture of transparency, collaboration, and continuous learning.

Our journey has been challenging, but we have always stayed true to our purpose. We are committed to transforming the software development and digital engineering industry, one step at a time. We look to the future with great anticipation. With our passion, expertise, and commitment to excellence, we are confident that SINGULAR WORK BENCH INC will continue to grow and thrive.

As a leader in digital innovation, SINGULAR WORK BENCH INC is committed to transforming businesses through advanced digital services. We are committed to excellence, helping businesses embrace the future, create a better life, and achieve extraordinary success in the evolving digital landscape.

To ensure the safety of user funds, SINGULAR WORK BENCH INC has adopted the terms of service of Tether Limited. We use Tether ETH BTC TRC's blockchain technology, which meets international compliance standards and regulations and adopts blockchain decentralization for transparency, traceability and world-class security. All user deposits are pledged in blockchain smart contracts. SINGULAR WORK BENCH INC and merchants automatically deposit 50% of user funds as a margin. After the order is completed, the smart contract releases the funds. If the order transaction cannot be completed due to the SINGULAR WORK BENCH INC platform or the merchant, the smart contract will compensate the user with the merchant and platform deposits. User fund security is our top priority.

SINGULAR WORK BENCH INC currently provides product maintenance services for global online e-commerce retailers, helping merchants maintain product exposure and positive reviews. Using our AI system, we improve merchants' ratings and exposure, ensure that their products are updated and attract buyers.

SINGULAR WORK BENCH INC has successfully created a platform for merchants and users to make money together. From concept to design, website development, digital marketing and consulting, we complete the business process and provide end-to-end solutions.

Our clients have a 94.7% satisfaction rating for service and support and a 96.3% service quality index. We serve clients in 44 countries and 15 industries, solving their toughest challenges with unparalleled service. We believe in a client-centric approach and emphasize team development.

We are servant leaders who put the interests of others at the center of everything we do, define reality and commit to serving others.`;
    const raw = (s.about_story && s.about_story.trim()) ? s.about_story : defaultStory;
    const paras = raw.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);
    storyEl.innerHTML = paras.map((p, i) => {
      const isFirst = i === 0;
      return `<p style="margin:0 0 ${isFirst ? '20px' : '14px'};${isFirst ? 'font-size:15px;font-weight:600;color:var(--dark);border-left:3px solid var(--primary);padding-left:12px;' : ''}">${p.replace(/\n/g,' ')}</p>`;
    }).join('');
  }).catch(() => {});
</script>
</body>
</html>
