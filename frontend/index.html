<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncralinkUS - Earn While You Shop</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/sitename.js"></script>
<style>
  /* ── Reset for this page ── */
  body { background: #050608; overflow: hidden; }

  /* ── Full screen split layout ── */
  .welcome-wrap {
    display: flex;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    flex: 0 0 42%;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 48px 40px;
    overflow: hidden;
    background: #050608;
    background-image: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=900&q=80&fit=crop');
    background-size: cover;
    background-position: center;
  }

  /* Gradient overlay — black + orange glow + cyan glow */
  .left-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 15% 15%, rgba(244,121,32,0.35) 0%, transparent 65%),
      radial-gradient(ellipse 55% 45% at 85% 75%, rgba(0,180,220,0.28) 0%, transparent 65%),
      linear-gradient(180deg, rgba(5,6,8,0.55) 0%, rgba(5,6,8,0.75) 100%);
    z-index: 0;
  }

  /* Decorative blobs */
  .blob-1 {
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(244,121,32,0.22), transparent 70%);
    top: -100px; left: -100px;
    filter: blur(50px);
    animation: float1 9s ease-in-out infinite;
  }
  .blob-2 {
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,180,220,0.2), transparent 70%);
    bottom: 80px; right: -70px;
    filter: blur(40px);
    animation: float2 11s ease-in-out infinite;
  }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(22px,28px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-18px,-22px)} }

  .left-content { position: relative; z-index: 1; display: flex; flex-direction: column; }

  .brand-logo {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 48px;
    color: #fff;
  }

  .welcome-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(244,121,32,0.9);
    margin-bottom: 12px;
  }

  .welcome-title {
    font-size: clamp(42px, 5vw, 64px);
    font-weight: 900;
    line-height: 1.05;
    color: #fff;
    letter-spacing: -2px;
    margin-bottom: 16px;
  }

  .welcome-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.55);
    line-height: 1.7;
    margin-bottom: 40px;
    max-width: 300px;
  }

  /* ── Glass Card CTA Buttons ── */
  .cta-group {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }

  /* Outer glassmorphism card */
  .btn-glass {
    position: relative;
    padding: 14px;
    border-radius: 64px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -1px 0 rgba(0,0,0,0.2);
    text-decoration: none;
    display: inline-flex;
    cursor: pointer;
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    overflow: visible;
  }
  .btn-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.15));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  /* Inner glowing pill */
  .btn-glass .pill {
    position: relative;
    padding: 16px 40px;
    border-radius: 50px;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .3px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    isolation: isolate;
  }
  .btn-glass .pill::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    z-index: -2;
  }
  /* Top highlight on pill (glossy) */
  .btn-glass .pill::after {
    content: '';
    position: absolute;
    left: 10%; right: 10%; top: 3px; height: 40%;
    border-radius: 50px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.35), rgba(255,255,255,0));
    pointer-events: none;
    z-index: -1;
  }

  /* Login — brand orange */
  .btn-login.btn-glass .pill::before {
    background: linear-gradient(135deg, #FF8A30 0%, #F47920 45%, #E8620A 100%);
    box-shadow:
      0 0 0 1px rgba(244,121,32,0.4),
      0 10px 30px rgba(244,121,32,0.55),
      0 0 40px rgba(244,121,32,0.35);
  }
  .btn-login.btn-glass:hover {
    transform: translateY(-3px);
    border-color: rgba(244,121,32,0.35);
    box-shadow:
      0 14px 44px rgba(244,121,32,0.35),
      inset 0 1px 0 rgba(255,255,255,0.22);
  }
  .btn-login.btn-glass:hover .pill::before {
    box-shadow:
      0 0 0 1px rgba(244,121,32,0.55),
      0 14px 38px rgba(244,121,32,0.7),
      0 0 56px rgba(244,121,32,0.5);
  }

  /* Register — brand cyan */
  .btn-register.btn-glass .pill::before {
    background: linear-gradient(135deg, #2DD4F0 0%, #00C8E8 45%, #0099CC 100%);
    box-shadow:
      0 0 0 1px rgba(0,200,232,0.4),
      0 10px 30px rgba(0,200,232,0.5),
      0 0 40px rgba(0,200,232,0.3);
  }
  .btn-register.btn-glass:hover {
    transform: translateY(-3px);
    border-color: rgba(0,200,232,0.35);
    box-shadow:
      0 14px 44px rgba(0,200,232,0.32),
      inset 0 1px 0 rgba(255,255,255,0.22);
  }
  .btn-register.btn-glass:hover .pill::before {
    box-shadow:
      0 0 0 1px rgba(0,200,232,0.55),
      0 14px 38px rgba(0,200,232,0.65),
      0 0 56px rgba(0,200,232,0.45);
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 28px;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .stat-item .s-num { font-size: 22px; font-weight: 800; color: #F47920; }
  .stat-item .s-lbl { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; letter-spacing: 0.5px; }

  /* ── RIGHT PANEL ── */
  .right-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #050608;
  }

  /* Dark gradient fade on left edge */
  .right-panel::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 80px;
    background: linear-gradient(to right, #050608, transparent);
    z-index: 10;
    pointer-events: none;
  }
  /* Fade on right edge */
  .right-panel::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 60px;
    background: linear-gradient(to left, #050608, transparent);
    z-index: 10;
    pointer-events: none;
  }

  .products-label {
    position: absolute;
    top: 28px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    z-index: 20;
  }

  /* Columns container */
  .cols-wrap {
    display: flex;
    gap: 12px;
    padding: 64px 16px 0 16px;
    height: 100%;
  }

  /* Each scrolling column */
  .p-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }

  .p-col { visibility: hidden; }
  .p-col.ready.col-up   { visibility: visible; animation: scrollUp   55s linear infinite; }
  .p-col.ready.col-down { visibility: visible; animation: scrollDown  65s linear infinite; }
  .p-col.ready.col-up2  { visibility: visible; animation: scrollUp   48s linear infinite; }

  @keyframes scrollUp   { 0%{transform:translateY(0)} 100%{transform:translateY(-50%)} }
  @keyframes scrollDown { 0%{transform:translateY(-50%)} 100%{transform:translateY(0)} }

  /* Product card in showcase */
  .p-card {
    border-radius: 14px;
    overflow: hidden;
    background: #0e1015;
    border: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    transition: transform .3s, box-shadow .3s;
    cursor: pointer;
  }
  .p-card:hover {
    transform: scale(1.02);
    box-shadow: 0 8px 30px rgba(244,121,32,0.25);
    border-color: rgba(244,121,32,0.25);
  }
  .p-card img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    display: block;
  }
  .p-card .p-info {
    padding: 10px 12px 12px;
  }
  .p-card .p-name {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .p-card .p-price {
    font-size: 14px;
    font-weight: 800;
    color: #F47920;
    margin-top: 3px;
  }
  .p-card .p-rate {
    font-size: 10px;
    color: rgba(0,180,220,0.6);
    margin-top: 2px;
  }

  /* ── MOBILE Layout ── */
  @media (max-width: 768px) {
    body { overflow: auto; }
    .welcome-wrap { flex-direction: column; height: auto; min-height: 100vh; }

    .left-panel {
      flex: none;
      min-height: 100vh;
      padding: 56px 24px 40px;
      justify-content: flex-start;
    }

    .right-panel {
      display: none; /* hide product showcase on small mobile */
    }

    /* Show 2-row product grid on mobile */
    .mobile-products {
      display: flex !important;
    }

    .brand-logo { margin-bottom: 32px; }
    .welcome-title { font-size: 44px; }
    .stats-row { gap: 20px; }
  }

  @media (min-width: 769px) {
    .mobile-products { display: none; }
  }

  /* Mobile product grid — 2 rows scrolling */
  .mobile-products {
    display: none;
    overflow: hidden;
    width: 100%;
    margin-top: 28px;
    position: relative;
    gap: 8px;
    flex-direction: column;
  }

  .mobile-row {
    display: flex;
    gap: 8px;
    width: max-content;
  }
  .mobile-row-1 { animation: scrollLeft  220s linear infinite; }
  .mobile-row-2 { animation: scrollRight 260s linear infinite; }

  @keyframes scrollLeft  { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  @keyframes scrollRight { 0%{transform:translateX(-50%)} 100%{transform:translateX(0)} }

  .m-card {
    width: 118px;
    flex-shrink: 0;
    border-radius: 12px;
    overflow: hidden;
    background: #0e1015;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .m-card img { width:100%; height:74px; object-fit:cover; display:block; }
  .m-card .m-info { padding: 7px 9px 9px; }
  .m-card .m-name { font-size:10px; color:rgba(255,255,255,0.75); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .m-card .m-price { font-size:11px; font-weight:800; color:#F47920; margin-top:2px; }
</style>
</head>
<body>

<div class="welcome-wrap">

  <!-- ══ LEFT PANEL ══ -->
  <div class="left-panel">
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,6,8,0.6) 0%,rgba(5,6,8,0.82) 100%);z-index:0;"></div>
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div class="left-content">
      <div class="brand-logo" id="brandLogo" data-site-name>SyncralinkUS</div>

      <div class="welcome-label">Commission Platform</div>
      <h1 class="welcome-title">Welcome<br>Back.</h1>
      <p class="welcome-sub">Earn real commissions by reviewing trending products. Join thousands already earning daily.</p>

      <div class="cta-group">
        <a href="login.html" class="btn-login btn-glass"><span class="pill">Log In</span></a>
        <a href="register.html" class="btn-register btn-glass"><span class="pill">Register</span></a>
      </div>

      <div class="stats-row">
        <div class="stat-item">
          <div class="s-num">10K+</div>
          <div class="s-lbl">Members</div>
        </div>
        <div class="stat-item">
          <div class="s-num">$2M+</div>
          <div class="s-lbl">Paid Out</div>
        </div>
        <div class="stat-item">
          <div class="s-num">3%</div>
          <div class="s-lbl">Max Commission</div>
        </div>
      </div>
    </div>

    <!-- Mobile product grid 2 rows (shown only on small screens) -->
    <div class="mobile-products" id="mobileProducts">
      <div class="mobile-row mobile-row-1" id="mobileRow1"></div>
      <div class="mobile-row mobile-row-2" id="mobileRow2"></div>
    </div>
  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right-panel">
    <div class="products-label">Trending Products</div>

    <div class="cols-wrap" id="colsWrap">
      <div class="p-col col-up"   id="col0"></div>
      <div class="p-col col-down" id="col1"></div>
      <div class="p-col col-up2" id="col2"></div>
      <div class="p-col col-down" id="col3" style="animation-duration:28s"></div>
    </div>
  </div>

</div>

<script src="js/api.js"></script>
<script>
  // Welcome page — always show, no redirect

  // Placeholder product cards when no API
  const PLACEHOLDER_PRODUCTS = [
    { name: 'Running Sneakers', price: 59.99, commission_rate: 1.5, image_url: '' },
    { name: 'Wireless Earbuds', price: 89.99, commission_rate: 2.0, image_url: '' },
    { name: 'Smart Watch',      price: 149.99, commission_rate: 2.0, image_url: '' },
    { name: 'Leather Backpack', price: 79.99, commission_rate: 1.5, image_url: '' },
    { name: 'Coffee Maker',     price: 65.99, commission_rate: 1.5, image_url: '' },
    { name: 'Yoga Mat',         price: 35.99, commission_rate: 1.0, image_url: '' },
    { name: 'Gaming Mouse',     price: 39.99, commission_rate: 1.5, image_url: '' },
    { name: 'Silk Scarf',       price: 29.99, commission_rate: 1.0, image_url: '' },
    { name: 'Skincare Set',     price: 49.99, commission_rate: 1.5, image_url: '' },
    { name: 'Desk Lamp',        price: 27.99, commission_rate: 1.0, image_url: '' },
    { name: 'Headphones Pro',   price: 99.99, commission_rate: 2.0, image_url: '' },
    { name: 'Water Bottle',     price: 24.99, commission_rate: 1.0, image_url: '' },
  ];

  // Gradient placeholder colors for cards without images
  const GRAD_COLORS = [
    ['#4c1d95','#7c3aed'], ['#831843','#be185d'], ['#1e3a5f','#1d4ed8'],
    ['#064e3b','#065f46'], ['#7c2d12','#9a3412'], ['#1f2937','#374151'],
    ['#312e81','#4338ca'], ['#701a75','#a21caf'], ['#1a2e05','#365314'],
  ];

  function makeCard(p, idx) {
    const [c1, c2] = GRAD_COLORS[idx % GRAD_COLORS.length];
    const imgContent = p.image_url
      ? `<img src="${p.image_url}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div style=\'width:100%;height:130px;background:linear-gradient(135deg,${c1},${c2});display:flex;align-items:center;justify-content:center;font-size:32px;\'>🛍️</div>'">`
      : `<div style="width:100%;height:130px;background:linear-gradient(135deg,${c1},${c2});display:flex;align-items:center;justify-content:center;font-size:32px;">🛍️</div>`;
    return `
      <div class="p-card">
        ${imgContent}
        <div class="p-info">
          <div class="p-name">${p.name}</div>
          <div class="p-price">$${parseFloat(p.price).toFixed(2)}</div>
          <div class="p-rate">⭐ ${p.commission_rate}% commission</div>
        </div>
      </div>`;
  }

  function makeMobileCard(p, idx) {
    const [c1, c2] = GRAD_COLORS[idx % GRAD_COLORS.length];
    const imgContent = p.image_url
      ? `<img src="${p.image_url}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div style=\'width:100%;height:70px;background:linear-gradient(135deg,${c1},${c2});display:flex;align-items:center;justify-content:center;font-size:20px;\'>🛍️</div>'">`
      : `<div style="width:100%;height:70px;background:linear-gradient(135deg,${c1},${c2});display:flex;align-items:center;justify-content:center;font-size:20px;">🛍️</div>`;
    return `
      <div class="m-card">
        ${imgContent}
        <div class="m-info">
          <div class="m-name">${p.name}</div>
          <div class="m-price">$${parseFloat(p.price).toFixed(2)}</div>
        </div>
      </div>`;
  }

  function buildColumns(products) {
    // Ensure enough cards by duplicating for infinite scroll
    const doubled = [...products, ...products];
    const cols = [[], [], [], []];
    doubled.forEach((p, i) => cols[i % 4].push(p));

    for (let c = 0; c < 4; c++) {
      const colEl = document.getElementById('col' + c);
      if (!colEl) continue;
      const items = [...cols[c], ...cols[c]];
      colEl.innerHTML = items.map((p, i) => makeCard(p, i)).join('');
      // Start animation only after content is rendered
      requestAnimationFrame(() => colEl.classList.add('ready'));
    }
  }

  function buildMobileStrip(products) {
    const row1 = document.getElementById('mobileRow1');
    const row2 = document.getElementById('mobileRow2');
    if (!row1 || !row2) return;
    // Split products into 2 rows alternating, duplicate for infinite loop
    const r1 = products.filter((_, i) => i % 2 === 0);
    const r2 = products.filter((_, i) => i % 2 === 1);
    // Triple to ensure enough content for seamless loop
    const fill1 = [...r1, ...r1, ...r1];
    const fill2 = [...r2, ...r2, ...r2];
    row1.innerHTML = fill1.map((p, i) => makeMobileCard(p, i)).join('');
    row2.innerHTML = fill2.map((p, i) => makeMobileCard(p, i)).join('');
  }

  async function loadProducts() {
    let products = PLACEHOLDER_PRODUCTS;
    try {
      const res = await fetch('/api/tasks/products');
      const json = await res.json();
      if (json.success && json.data && json.data.length > 0) {
        products = json.data;
      }
    } catch (e) { /* use placeholders */ }

    buildColumns(products);
    buildMobileStrip(products);
  }

  loadProducts();
</script>
<script src="js/transitions.js"></script>
</body>
</html>
