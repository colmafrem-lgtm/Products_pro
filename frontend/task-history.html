<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task History - SyncralinkUS</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .page-header {
    background: var(--gradient);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #fff;
  }
  .page-header .back-btn {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; text-decoration: none; color: #fff;
    flex-shrink: 0;
  }
  .page-header h1 { font-size: 18px; font-weight: 800; margin: 0; }

  .history-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px;
    background: var(--gradient-soft);
  }
  .summary-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
    box-shadow: var(--card-shadow);
  }
  .summary-card .sc-value { font-size: 22px; font-weight: 900; color: var(--primary); }
  .summary-card .sc-label { font-size: 11px; color: var(--text-light); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }

  .history-list { padding: 12px 16px 100px; }

  .history-item {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border: 1px solid var(--border);
  }
  .hi-img {
    width: 56px; height: 56px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--gradient-soft);
  }
  .hi-body { flex: 1; min-width: 0; }
  .hi-name {
    font-size: 14px; font-weight: 700; color: var(--dark);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hi-date { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .hi-stars { font-size: 12px; margin-top: 4px; }
  .hi-right { text-align: right; flex-shrink: 0; }
  .hi-commission { font-size: 15px; font-weight: 800; color: var(--success); }
  .hi-badge {
    display: inline-block;
    background: rgba(16,185,129,0.1);
    color: var(--success);
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 50px;
    margin-top: 4px; text-transform: uppercase; letter-spacing: .4px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }
  .empty-state .es-icon { font-size: 52px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  .load-more-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--gradient-soft);
    border: 1.5px solid var(--primary);
    border-radius: var(--radius);
    color: var(--primary);
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    text-align: center;
    margin-top: 8px;
  }
  .skeleton {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>
<div class="desktop-layout">
<!-- Desktop Sidebar -->
<aside class="desktop-sidebar" id="dsSidebar">
  <div class="ds-logo">
    <div class="ds-logo-icon">⚡</div>
    <span>SyncralinkUS</span>
  </div>
  <nav class="ds-nav">
    <a href="dashboard.html" class="ds-nav-item"><span>🏠</span> Home</a>
    <a href="tasks.html" class="ds-nav-item"><span>✅</span> Tasks</a>
    <a href="wallet.html" class="ds-nav-item"><span>👛</span> Wallet</a>
    <a href="profile.html" class="ds-nav-item active"><span>👤</span> Profile</a>
  </nav>
</aside>

<div class="mobile-app">
  <!-- Header -->
  <div class="page-header">
    <a href="profile.html" class="back-btn">←</a>
    <h1>Task History</h1>
  </div>

  <!-- Summary -->
  <div class="history-summary">
    <div class="summary-card">
      <div class="sc-value" id="totalTasks">—</div>
      <div class="sc-label">Total Tasks</div>
    </div>
    <div class="summary-card">
      <div class="sc-value" id="totalEarned">—</div>
      <div class="sc-label">Total Earned</div>
    </div>
  </div>

  <!-- List -->
  <div class="history-list" id="historyList">
    <div class="history-item"><div class="skeleton hi-img"></div><div class="hi-body"><div class="skeleton" style="height:14px;width:70%;border-radius:6px;margin-bottom:6px;"></div><div class="skeleton" style="height:11px;width:45%;border-radius:6px;"></div></div><div class="hi-right"><div class="skeleton" style="height:15px;width:50px;border-radius:6px;margin-bottom:6px;"></div></div></div>
    <div class="history-item"><div class="skeleton hi-img"></div><div class="hi-body"><div class="skeleton" style="height:14px;width:70%;border-radius:6px;margin-bottom:6px;"></div><div class="skeleton" style="height:11px;width:45%;border-radius:6px;"></div></div><div class="hi-right"><div class="skeleton" style="height:15px;width:50px;border-radius:6px;margin-bottom:6px;"></div></div></div>
    <div class="history-item"><div class="skeleton hi-img"></div><div class="hi-body"><div class="skeleton" style="height:14px;width:70%;border-radius:6px;margin-bottom:6px;"></div><div class="skeleton" style="height:11px;width:45%;border-radius:6px;"></div></div><div class="hi-right"><div class="skeleton" style="height:15px;width:50px;border-radius:6px;margin-bottom:6px;"></div></div></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="tasks.html" class="nav-item"><span class="nav-icon">✅</span><span>Tasks</span></a>
    <a href="#" class="nav-item nav-add"><span>＋</span></a>
    <a href="wallet.html" class="nav-item"><span class="nav-icon">👛</span><span>Wallet</span></a>
    <a href="profile.html" class="nav-item active"><span class="nav-icon">👤</span><span>Profile</span></a>
  </nav>
</div>
</div>

<script src="js/api.js"></script>
<script>
  let currentPage = 1;
  let totalPages = 1;
  let totalEarned = 0;

  function formatMoney(v) {
    return '$' + parseFloat(v || 0).toFixed(2);
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
           ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function renderStars(rating) {
    if (!rating) return '';
    const stars = '⭐'.repeat(rating) + '☆'.repeat(5 - rating);
    return `<div class="hi-stars">${stars}</div>`;
  }

  function renderItems(tasks) {
    if (!tasks.length) return '';
    return tasks.map(t => `
      <div class="history-item">
        <img class="hi-img"
             src="${t.image_url || ''}"
             alt="${t.product_name || 'Product'}"
             onerror="this.style.background='linear-gradient(135deg,#EDE9FE,#FCE7F3)';this.removeAttribute('src');">
        <div class="hi-body">
          <div class="hi-name">${t.product_name || 'Product'}</div>
          <div class="hi-date">📅 ${formatDate(t.created_at)}</div>
          ${renderStars(t.rating)}
        </div>
        <div class="hi-right">
          <div class="hi-commission">+${formatMoney(t.commission_amount)}</div>
          <div class="hi-badge">Completed</div>
        </div>
      </div>
    `).join('');
  }

  async function loadHistory(page = 1) {
    try {
      const res = await Tasks.getHistory(page);
      if (!res || !res.ok) throw new Error('Failed');
      const data = res.data.data;
      const tasks = data.tasks || [];
      totalPages = data.pagination?.pages || 1;

      // sum total earned
      tasks.forEach(t => { totalEarned += parseFloat(t.commission_amount || 0); });

      // update summary
      document.getElementById('totalTasks').textContent = data.pagination?.total || tasks.length;
      document.getElementById('totalEarned').textContent = formatMoney(totalEarned);

      const list = document.getElementById('historyList');

      if (page === 1) {
        if (!tasks.length) {
          list.innerHTML = `
            <div class="empty-state">
              <div class="es-icon">📋</div>
              <h3>No Task History Yet</h3>
              <p>Complete tasks to see your history here.</p>
              <a href="tasks.html" class="btn btn-primary mt-16" style="display:inline-flex;">Go to Tasks</a>
            </div>`;
          return;
        }
        list.innerHTML = renderItems(tasks);
      } else {
        // remove load more btn before appending
        const oldBtn = document.getElementById('loadMoreBtn');
        if (oldBtn) oldBtn.remove();
        list.insertAdjacentHTML('beforeend', renderItems(tasks));
      }

      // show load more if more pages
      if (page < totalPages) {
        list.insertAdjacentHTML('beforeend', `
          <button id="loadMoreBtn" class="load-more-btn" onclick="loadMore()">Load More</button>`);
      }

    } catch (err) {
      console.error(err);
      document.getElementById('historyList').innerHTML = `
        <div class="empty-state">
          <div class="es-icon">⚠️</div>
          <h3>Failed to load history</h3>
          <p>Please try again later.</p>
        </div>`;
    }
  }

  function loadMore() {
    currentPage++;
    loadHistory(currentPage);
  }

  // init
  loadHistory(1);
</script>
</body>
</html>
